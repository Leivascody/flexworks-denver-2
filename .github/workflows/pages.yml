# Publishes the static site (everything except /api) to GitHub Pages
# on every push to main. Live URL: https://<your-user>.github.io/<repo-name>/
#
# Note: GitHub Pages cannot run the serverless functions in /api.
# For the email backend (track + tearsheet), deploy to Vercel instead — see BACKEND_SETUP.md.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
